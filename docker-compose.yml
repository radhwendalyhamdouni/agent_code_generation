version: '3.8'

services:
  # Main Application
  almarjaa-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./sandbox:/app/sandbox
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Terminal Controller Service
  terminal-service:
    build:
      context: ./mini-services/terminal-controller
      dockerfile: Dockerfile.service
    ports:
      - "3030:3030"
    volumes:
      - ./sandbox:/app/sandbox
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sandbox:
  data:
